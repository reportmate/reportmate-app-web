name: Publish web image

# Publishes the dashboard image to GHCR for the self-host stack
# (github.com/reportmate/selfhosted-docker-reportmate). Runs on version tags or manually.

on:
  push:
    tags:
      # Accept both v-prefixed tags and the YYYY.MM.DD.HHMM datestamp tags the
      # client repos ship with, so the same tag convention triggers a publish.
      - 'v*'
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9][0-9][0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/reportmate/web
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
